name: Rudra Multimodal Agentic AI

on:
  # Trigger-free: runs when agent definitions change or on manual dispatch
  push:
    branches: [main, master, "claude/**"]
    paths:
      - "Rudra_Agents/**"
      - "multimodal_ai/**"
      - "requirements.txt"
  pull_request:
    paths:
      - "Rudra_Agents/**"
      - "multimodal_ai/**"
  workflow_dispatch:
    inputs:
      engagement_mode:
        description: "Engagement mode to run"
        required: true
        default: "month_end_close"
        type: choice
        options:
          - month_end_close
          - erp_implementation_kickoff
          - coa_redesign
          - intent_routing_demo
          - databricks_demo
      client_context:
        description: "Client context JSON (optional)"
        required: false
        default: "{}"

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ─── Validate Agent Definitions ────────────────────────────────────────
  validate-agents:
    name: Validate Rudra Agent Definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install validation dependencies
        run: pip install pyyaml

      - name: Validate agent YAML frontmatter
        run: |
          python - <<'EOF'
          import os
          import sys
          import yaml

          agents_dir = "Rudra_Agents"
          errors = []

          for filename in os.listdir(agents_dir):
              if not filename.endswith(".md"):
                  continue
              filepath = os.path.join(agents_dir, filename)
              with open(filepath) as f:
                  content = f.read()

              if not content.startswith("---"):
                  continue  # No frontmatter is OK

              try:
                  parts = content.split("---", 2)
                  if len(parts) >= 3:
                      metadata = yaml.safe_load(parts[1])
                      required = ["name", "description"]
                      for field in required:
                          if field not in metadata:
                              errors.append(f"{filename}: missing required field '{field}'")
              except yaml.YAMLError as e:
                  errors.append(f"{filename}: invalid YAML - {e}")

          if errors:
              for e in errors:
                  print(f"ERROR: {e}")
              sys.exit(1)
          else:
              print(f"OK: All {len(os.listdir(agents_dir))} agent files valid")
          EOF

  # ─── Install & Test ────────────────────────────────────────────────────
  test:
    name: Test Multimodal AI Package
    runs-on: ubuntu-latest
    needs: validate-agents
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test intent router (no API key required for imports)
        run: |
          python - <<'EOF'
          # Test that all modules import cleanly
          from multimodal_ai.intent_router import RUDRA_AGENTS, VISION_PROMPTS
          from multimodal_ai.kimi_orchestrator import _load_agent_definition
          from multimodal_ai.databricks_backend import RudraDataBrain

          # Validate all 13 agents are registered
          assert len(RUDRA_AGENTS) == 13, f"Expected 13 agents, got {len(RUDRA_AGENTS)}"

          # Validate Databricks mock mode works without credentials
          brain = RudraDataBrain()
          benchmarks = brain.get_apqc_benchmarks("9.3")
          assert isinstance(benchmarks, list), "Benchmarks should be a list"

          print("OK: All module imports and mock mode verified")
          print(f"OK: {len(RUDRA_AGENTS)} agents registered: {RUDRA_AGENTS}")
          EOF

      - name: Test agent definition loader
        run: |
          python - <<'EOF'
          from multimodal_ai.kimi_orchestrator import _load_agent_definition

          # Test loading actual agent files
          agents_to_test = ["rudra", "apqc-researcher", "coa-designer"]
          for agent in agents_to_test:
              content = _load_agent_definition(agent)
              assert len(content) > 0, f"Agent {agent} returned empty definition"
              print(f"OK: {agent} loaded ({len(content)} chars)")
          EOF

  # ─── Run Rudra Orchestration ────────────────────────────────────────────
  run-rudra:
    name: Run Rudra Multimodal Orchestration
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run intent routing demo
        if: github.event.inputs.engagement_mode == 'intent_routing_demo' || github.event_name == 'push'
        run: python -m multimodal_ai.main --demo routing

      - name: Run Databricks benchmark demo
        if: github.event.inputs.engagement_mode == 'databricks_demo'
        run: python -m multimodal_ai.main --demo databricks

      - name: Run month-end close optimization
        if: github.event.inputs.engagement_mode == 'month_end_close'
        run: python -m multimodal_ai.main --demo month_end_close

      - name: Run ERP implementation kickoff
        if: github.event.inputs.engagement_mode == 'erp_implementation_kickoff'
        run: |
          python - <<'EOF'
          import asyncio
          import json
          from multimodal_ai.kimi_orchestrator import run_erp_implementation_kickoff

          client_data = json.loads('${{ github.event.inputs.client_context }}' or '{}')
          if not client_data:
              client_data = {
                  "client": "Example Corp",
                  "erp_target": "Oracle ERP Cloud",
                  "go_live": "Q4 2025",
                  "entities": 5,
              }

          result = asyncio.run(run_erp_implementation_kickoff(client_data))
          print(result["synthesis"][:2000])
          EOF

      - name: Run COA redesign
        if: github.event.inputs.engagement_mode == 'coa_redesign'
        run: |
          python - <<'EOF'
          import asyncio
          from multimodal_ai.kimi_orchestrator import run_coa_redesign

          client_data = {"client": "Example Corp", "entities": 5, "currencies": 3}
          result = asyncio.run(run_coa_redesign(client_data))
          print(result["synthesis"][:2000])
          EOF

  # ─── Deploy Agent Definitions ────────────────────────────────────────────
  deploy:
    name: Deploy Updated Agent Definitions
    runs-on: ubuntu-latest
    needs: [test, run-rudra]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Package agent definitions
        run: |
          tar -czf rudra-agents-${{ github.sha }}.tar.gz Rudra_Agents/ multimodal_ai/

      - name: Upload agent package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rudra-agents-${{ github.sha }}
          path: rudra-agents-${{ github.sha }}.tar.gz
          retention-days: 90
